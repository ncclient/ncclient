name: Release to TestPyPI

on:
  push:
    tags:
      - "v*.*.*rc*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Validate release candidate tag
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+rc[0-9]+$ ]]; then
            echo "Tag ${tag} does not match vX.Y.ZrcN"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12.9"

      - name: Build distributions for TestPyPI
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ github.ref_name }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install hatchling hatch-vcs twine
          export SETUPTOOLS_SCM_PRETEND_VERSION="${SETUPTOOLS_SCM_PRETEND_VERSION#v}"
          sed -i 's/^name = "ncclient"$/name = "ncclient_test"/' pyproject.toml
          grep '^name = "ncclient_test"$' pyproject.toml
          hatchling build -c
          ls "dist/ncclient_test-${SETUPTOOLS_SCM_PRETEND_VERSION}"*
          python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v6
        with:
          if-no-files-found: error
          name: python-distributions
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/p/ncclient_test
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: python-distributions
          path: dist

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
