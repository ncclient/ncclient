name: Release to TestPyPI

on:
  push:
    tags:
      - "v*.*.*rc*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    outputs:
      valid_tag: ${{ steps.validate.outputs.valid_tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Validate release candidate tag
        id: validate
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+rc[0-9]+$ ]]; then
            echo "Tag ${tag} does not match vX.Y.ZrcN; skipping release."
            echo "valid_tag=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "valid_tag=true" >> "${GITHUB_OUTPUT}"

      - name: Set up Python
        if: ${{ steps.validate.outputs.valid_tag == 'true' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.12.9"

      - name: Build distributions for TestPyPI
        if: ${{ steps.validate.outputs.valid_tag == 'true' }}
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ github.ref_name }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install hatchling hatch-vcs twine
          export SETUPTOOLS_SCM_PRETEND_VERSION="${SETUPTOOLS_SCM_PRETEND_VERSION#v}"
          sed -i 's/^name = "ncclient"$/name = "ncclient_test"/' pyproject.toml
          grep '^name = "ncclient_test"$' pyproject.toml
          hatchling build -c
          ls "dist/ncclient_test-${SETUPTOOLS_SCM_PRETEND_VERSION}"*
          python -m twine check dist/*

      - name: Upload distributions
        if: ${{ steps.validate.outputs.valid_tag == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: python-distributions
          path: dist/*

      - name: Skip release
        if: ${{ steps.validate.outputs.valid_tag != 'true' }}
        run: echo "No TestPyPI release published for ${GITHUB_REF_NAME}."

  publish:
    needs: build
    if: ${{ needs.build.outputs.valid_tag == 'true' }}
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/p/ncclient_test
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-distributions
          path: dist

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
